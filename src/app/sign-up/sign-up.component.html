<div class="container">
    <form #signupForm="ngForm" (ngSubmit)="onSignUp(signupForm)">
        <h2>Sign Up</h2>

        <div>
            <label>Email:</label>
            <input type="email" name="email" ngModel required email />
            <div *ngIf="signupForm.controls['email']?.invalid && signupForm.controls['email']?.touched">
                <small>Email is required and must be valid.</small>
            </div>
        </div>

        <div>
            <label>Password:</label>
            <input type="password" name="password" ngModel required minlength="6" />
            <div *ngIf="signupForm.controls['password']?.invalid && signupForm.controls['password']?.touched">
                <small>Password is required and must be at least 6 characters.</small>
            </div>
        </div>

        <button type="submit" [disabled]="signupForm.invalid">Sign Up</button>
        <p *ngIf="successMessage">{{ successMessage }}</p>
        <p *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>
</div>
